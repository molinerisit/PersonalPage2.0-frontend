<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">Logo monograma JM</title>
  <desc id="desc">Monograma minimalista con las iniciales J y M dentro de una pastilla redondeada, con trazo degradado.</desc>

  <!-- ====== THEME / COLORS ====== -->
  <style>
    :root {
      --bg: transparent;                /* Fondo del ícono (usá transparent o un color) */
      --stroke1: #0ea5e9;               /* Celeste */
      --stroke2: #14b8a6;               /* Verde/teal */
      --strokeWidth: 12;                /* Grosor de las líneas */
    }
    @media (prefers-color-scheme: dark) {
      :root { --bg: transparent; }
    }
  </style>

  <!-- Fondo (opcional) -->
  <rect x="8" y="8" width="240" height="240" rx="56" fill="var(--bg)"></rect>

  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="var(--stroke1)"></stop>
      <stop offset="100%" stop-color="var(--stroke2)"></stop>
    </linearGradient>

    <!-- Sutil sombra del trazo -->
    <filter id="s" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.25"></feDropShadow>
    </filter>
  </defs>

  <!-- Letra J (trazo continuo redondeado) -->
  <path d="M 84 60
           L 84 152
           q 0 44 44 44
           q 26 0 44 -18" fill="none" stroke="url(#g)" stroke-width="var(--strokeWidth)" stroke-linecap="round" stroke-linejoin="round" filter="url(#s)"></path>

  <!-- Letra M (dos patas y pico central) -->
  <path d="M 128 96
           L 128 176
           M 128 96
           L 156 152
           L 184 96
           L 184 176" fill="none" stroke="url(#g)" stroke-width="var(--strokeWidth)" stroke-linecap="round" stroke-linejoin="round" filter="url(#s)"></path>
</svg>
